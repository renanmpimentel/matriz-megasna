name: Daily Mega-Sena Sync

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-megasena-sync
  cancel-in-progress: true

jobs:
  sync-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Sync latest draws
        run: npm run sync:data
        working-directory: web

      - name: Validate app build
        run: npm run build:static
        working-directory: web

      - name: Commit updated data
        run: |
          if git diff --quiet -- web/public/data/sorteios.json; then
            echo "No data changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/public/data/sorteios.json
          git commit -m "chore: update Mega-Sena draws"
          git push

name: Deploy Web to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Lint
        run: npm run lint
        working-directory: web

      - name: Typecheck
        run: npm run typecheck
        working-directory: web

      - name: Test
        run: npm test
        working-directory: web

      - name: Build static site
        run: npm run build:static
        working-directory: web

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  validate-production:
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Smoke check production URL
        run: |
          test -n "${{ needs.deploy.outputs.page_url }}"
          curl -fsS "${{ needs.deploy.outputs.page_url }}" > /tmp/prod.html
          grep -q "<div id=\"app\"></div>" /tmp/prod.html
